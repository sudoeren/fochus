name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            See the [commit log](https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}) for details.
          draft: false
          prerelease: false

  build:
    name: Build and package (${{ matrix.target }})
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-x64
            node_version: 22.14.0
            archive_ext: .tar.gz

          - target: linux-arm64
            node_version: 22.14.0
            archive_ext: .tar.gz

          - target: macos-arm64
            node_version: 22.14.0
            archive_ext: .tar.gz

          - target: win-x64
            node_version: 22.14.0
            archive_ext: .zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Prepare package directory
        run: |
          PKG_DIR="fochus-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$PKG_DIR/backend"
          cp -r backend/dist "$PKG_DIR/backend/dist"
          cp -r backend/prisma "$PKG_DIR/backend/prisma"
          cp backend/package.json "$PKG_DIR/backend/package.json"
          cp -r backend/node_modules "$PKG_DIR/backend/node_modules"
          mkdir -p "$PKG_DIR/backend/public"
          cp -r dist/* "$PKG_DIR/backend/public/"
          cp scripts/start.sh "$PKG_DIR/start.sh"
          chmod +x "$PKG_DIR/start.sh"
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            cp scripts/start.bat "$PKG_DIR/start.bat"
          fi

      - name: Download and bundle portable Node.js (${{ matrix.target }})
        run: |
          PKG_DIR="fochus-${{ github.ref_name }}-${{ matrix.target }}"
          NV="${{ matrix.node_version }}"

          case "${{ matrix.target }}" in
            win-x64)
              curl -L "https://nodejs.org/dist/v${NV}/node-v${NV}-win-x64.zip" -o node.zip
              unzip -q node.zip
              mv "node-v${NV}-win-x64" "$PKG_DIR/node"
              rm -rf "$PKG_DIR/node/node_modules" "$PKG_DIR/node/include" "$PKG_DIR/node/share"
              ;;
            macos-arm64)
              curl -L "https://nodejs.org/dist/v${NV}/node-v${NV}-darwin-arm64.tar.gz" | tar xzf -
              mv "node-v${NV}-darwin-arm64" "$PKG_DIR/node"
              rm -rf "$PKG_DIR/node/include" "$PKG_DIR/node/share"
              ;;
            linux-x64)
              curl -L "https://nodejs.org/dist/v${NV}/node-v${NV}-linux-x64.tar.xz" | tar xJf -
              mv "node-v${NV}-linux-x64" "$PKG_DIR/node"
              rm -rf "$PKG_DIR/node/include" "$PKG_DIR/node/share"
              ;;
            linux-arm64)
              curl -L "https://nodejs.org/dist/v${NV}/node-v${NV}-linux-arm64.tar.xz" | tar xJf -
              mv "node-v${NV}-linux-arm64" "$PKG_DIR/node"
              rm -rf "$PKG_DIR/node/include" "$PKG_DIR/node/share"
              ;;
          esac

      - name: Package archive
        run: |
          PKG_DIR="fochus-${{ github.ref_name }}-${{ matrix.target }}"
          ARCHIVE="fochus-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = ".zip" ]; then
            cd "$PKG_DIR" && zip -r "../$ARCHIVE" . && cd ..
          else
            tar czf "$ARCHIVE" "$PKG_DIR"
          fi

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./fochus-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }}
          asset_name: fochus-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_ext }}
          asset_content_type: application/octet-stream
