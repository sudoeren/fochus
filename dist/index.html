            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var shouldBeDark = theme === 'dark' || (theme !== 'light' && prefersDark);
          document.documentElement.classList.toggle('dark', shouldBeDark);

          // Ignore errors (e.g. storage disabled).
        }
      })();
