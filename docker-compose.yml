# Fokus App - Docker Compose
# Local development and production deployment

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fokus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fokus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fokus_password}
      POSTGRES_DB: ${POSTGRES_DB:-fokus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fokus} -d ${POSTGRES_DB:-fokus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fokus-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fokus-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fokus}:${POSTGRES_PASSWORD:-fokus_password}@db:5432/${POSTGRES_DB:-fokus_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fokus-network

  # Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: fokus-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fokus-network

volumes:
  postgres_data:
    driver: local

networks:
  fokus-network:
    driver: bridge
