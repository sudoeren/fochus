# Fokus App - Docker Compose
# Local development and production deployment

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fokus-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: file:./data/fokus.db
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      PORT: 5800
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5800}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    expose:
      - 5800
    volumes:
      - fokus_data:/app/data
    healthcheck:
        test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fokus-network

  # Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: fokus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-5800}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fokus-network

volumes:
  fokus_data:
    driver: local

networks:
  fokus-network:
    driver: bridge
