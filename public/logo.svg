<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- App Theme Gradient (Blue-500 to Blue-700) -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" /> <!-- Blue-500 -->
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" /> <!-- Blue-700 -->
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(29, 78, 216, 0.3)"/>
    </filter>

    <!-- Inner Glow -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dy="1" dx="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="white" flood-opacity="0.2"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background: White squircle with subtle border matching app theme -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="#ffffff" stroke="#eff6ff" stroke-width="8"/>
  
  <!-- Main Logo Mark: Stylized 'F' formed by Focus Brackets -->
  <g transform="translate(256, 256)" filter="url(#softShadow)">
    
    <!-- Left Vertical Bar (Part of F and Focus Frame) -->
    <path d="M-80 -100 
             L-20 -100 
             Q20 -100 20 -60 
             L20 60 
             Q20 100 -20 100 
             L-80 100 
             Q-120 100 -120 60 
             L-120 -60 
             Q-120 -100 -80 -100 Z" 
          fill="url(#brandGradient)" filter="url(#innerGlow)" />

    <!-- Top Horizontal Bar (Top of F) -->
    <path d="M-20 -100 
             L100 -100 
             Q140 -100 140 -60 
             L140 -40 
             Q140 0 100 0 
             L-20 0 
             Z" 
          fill="url(#brandGradient)" filter="url(#innerGlow)" transform="translate(0, 0)" />

    <!-- Middle Horizontal Bar (Middle of F) -->
    <path d="M20 20 
             L100 20 
             Q140 20 140 60 
             L140 60 
             Q140 100 100 100 
             L20 100 
             Z" 
          fill="url(#brandGradient)" opacity="0.8" />
          
    <!-- Focus Dot / Accent -->
    <circle cx="100" cy="-60" r="20" fill="#fbbf24" /> <!-- Amber accent for contrast -->
  </g>
</svg>