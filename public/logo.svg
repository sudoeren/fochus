<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean white background -->
  <rect width="128" height="128" rx="28" fill="white"/>
  
  <defs>
    <!-- Premium gradient -->
    <linearGradient id="mainGrad" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    
    <!-- Subtle shadow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Abstract focus lens / eye shape -->
  <g filter="url(#softGlow)">
    <!-- Outer lens shape -->
    <ellipse cx="64" cy="64" rx="42" ry="42" stroke="url(#mainGrad)" stroke-width="4" fill="none"/>
    
    <!-- Inner rotating element - creates dynamic feel -->
    <path d="M64 28 A36 36 0 0 1 100 64" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M64 100 A36 36 0 0 1 28 64" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Center focus point with glow -->
    <circle cx="64" cy="64" r="12" fill="url(#mainGrad)"/>
    <circle cx="64" cy="64" r="6" fill="white"/>
    <circle cx="64" cy="64" r="3" fill="url(#mainGrad)"/>
  </g>
  
  <!-- Minimalist corner accents -->
  <circle cx="28" cy="28" r="3" fill="url(#mainGrad)" opacity="0.3"/>
  <circle cx="100" cy="100" r="3" fill="url(#mainGrad)" opacity="0.3"/>
</svg>
